<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Header -->
  <header>
    <h1>My Website</h1>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <!-- Main Section -->
  <section>

    <!-- Article -->
    <article>
      <h2>Welcome</h2>
      <p>This is a simple website created using semantic HTML.</p>
    </article>

    <!-- Form -->
    <form>
      <h2>Contact Form</h2>

      <label for="name">Name:</label>
      <input id="name" type="text" placeholder="Enter the name">

      <label for="email">Email:</label>
      <input id="email" type="email" placeholder="Enter the email">

      <button type="submit">Submit</button>
    </form>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
